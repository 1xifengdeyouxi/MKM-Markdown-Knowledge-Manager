server:
  port: 8080

spring:
  application:
    name: mkm-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/mkm_db
    username: ${DB_USER:mkm}
    password: ${DB_PASS:mkm}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

jwt:
  secret: ${JWT_SECRET:change-me-in-production-please-use-at-least-32-characters}
  expiration-ms: 86400000

logging:
  level:
    org.springframework.security: INFO
